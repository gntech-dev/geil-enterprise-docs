<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GEIL Hybrid Identity Namespace</title>
  <desc id="desc">Microsoft 365 connects to Microsoft Entra ID, which uses the UPN username@gntech.me for users synchronized from the Active Directory forest corp.gntech.me with NetBIOS name GNTECH.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 42px Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 20px Arial, sans-serif; fill: #94a3b8; }
      .box-title { font: 700 26px Arial, sans-serif; fill: #e0f2fe; }
      .box-text { font: 400 21px Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 700 20px Arial, sans-serif; fill: #38bdf8; }
      .note { font: 400 18px Arial, sans-serif; fill: #94a3b8; }
      .arrow { stroke: #38bdf8; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
      .side-arrow { stroke: #a78bfa; stroke-width: 4; fill: none; marker-end: url(#arrowhead-purple); stroke-dasharray: 10 8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#1e293b" stroke-width="1">
    <path d="M0 100 H1600 M0 200 H1600 M0 300 H1600 M0 400 H1600 M0 500 H1600 M0 600 H1600 M0 700 H1600 M0 800 H1600"/>
    <path d="M100 0 V900 M200 0 V900 M300 0 V900 M400 0 V900 M500 0 V900 M600 0 V900 M700 0 V900 M800 0 V900 M900 0 V900 M1000 0 V900 M1100 0 V900 M1200 0 V900 M1300 0 V900 M1400 0 V900 M1500 0 V900"/>
  </g>

  <text x="80" y="82" class="title">GEIL Hybrid Identity Namespace</text>
  <text x="80" y="118" class="subtitle">Public user sign-in namespace is intentionally different from the internal Active Directory DNS namespace.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="185" width="310" height="130" rx="20" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <text x="150" y="235" class="box-title">Microsoft 365</text>
    <text x="150" y="275" class="box-text">Verified domain</text>
    <text x="150" y="302" class="label">gntech.me</text>
  </g>

  <path class="arrow" d="M430 250 H560"/>

  <g filter="url(#shadow)">
    <rect x="560" y="185" width="330" height="130" rx="20" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/>
    <text x="590" y="235" class="box-title">Microsoft Entra ID</text>
    <text x="590" y="275" class="box-text">Cloud identity plane</text>
    <text x="590" y="302" class="label">Tenant: gntech.me</text>
  </g>

  <path class="arrow" d="M725 315 V420"/>

  <g filter="url(#shadow)">
    <rect x="515" y="420" width="420" height="135" rx="20" fill="#082f49" stroke="#38bdf8" stroke-width="4"/>
    <text x="550" y="470" class="box-title">Primary User UPN</text>
    <text x="550" y="510" class="label">username@gntech.me</text>
    <text x="550" y="540" class="box-text">Default sign-in everywhere</text>
  </g>

  <path class="arrow" d="M725 555 V660"/>

  <g filter="url(#shadow)">
    <rect x="470" y="660" width="510" height="155" rx="20" fill="#1e1b4b" stroke="#a78bfa" stroke-width="4"/>
    <text x="505" y="710" class="box-title">Active Directory Forest</text>
    <text x="505" y="750" class="label">corp.gntech.me</text>
    <text x="505" y="782" class="box-text">DNS namespace: corp.gntech.me</text>
    <text x="505" y="812" class="box-text">NetBIOS: GNTECH</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="355" width="360" height="185" rx="20" fill="#111827" stroke="#f59e0b" stroke-width="3"/>
    <text x="1140" y="405" class="box-title">Server FQDNs stay internal</text>
    <text x="1140" y="450" class="box-text">HQ-DC01.corp.gntech.me</text>
    <text x="1140" y="480" class="box-text">HQ-DC02.corp.gntech.me</text>
    <text x="1140" y="510" class="box-text">AD DNS records remain here</text>
  </g>

  <path class="side-arrow" d="M980 735 C1090 720 1110 555 1190 540"/>

  <g filter="url(#shadow)">
    <rect x="1110" y="635" width="360" height="130" rx="20" fill="#111827" stroke="#10b981" stroke-width="3"/>
    <text x="1140" y="685" class="box-title">Legacy logon</text>
    <text x="1140" y="728" class="label">GNTECH\username</text>
  </g>

  <path class="side-arrow" d="M980 760 H1110"/>

  <text x="80" y="850" class="note">Decision: forest DNS namespace = corp.gntech.me; user authentication namespace = gntech.me; NetBIOS = GNTECH.</text>
</svg>
