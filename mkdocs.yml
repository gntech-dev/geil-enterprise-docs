          - ADR-0002 MikroTik CHR Firewall: governance/adrs/ADR-0002-mikrotik-chr-phase-1-firewall.md
          - ADR-0003 Hybrid Identity Namespace: governance/adrs/ADR-0003-hybrid-identity-namespace.md
