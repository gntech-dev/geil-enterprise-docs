      - Documentation Standard: governance/documentation-standard.md
      - Deployment Style Guide: governance/deployment-style-guide.md
      - Implementation Guide Standard: governance/implementation-guide-standard.md
      - Code Block Quality Standard: governance/code-block-quality-standard.md
      - Naming and Addressing Standard: governance/naming-addressing-standard.md
      - Visual Documentation Standard: governance/visual-documentation-standard.md
      - Educational Documentation Standard: governance/educational-documentation-standard.md
      - ADRs:
