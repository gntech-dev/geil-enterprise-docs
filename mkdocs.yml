site_name: GEIL - GNTECH Enterprise Infrastructure Library
site_description: Private enterprise implementation guide for Microsoft-centered infrastructure
site_author: GNTECH Infrastructure Engineering
site_url: https://docs.gntechlabs.me/
repo_url: https://github.com/gntech-dev/geil-enterprise-docs
repo_name: gntech-dev/geil-enterprise-docs
edit_uri: edit/main/docs/
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
extra_css:
  - assets/stylesheets/geil-code.css
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - fenced_code
  - codehilite:
      guess_lang: false
      use_pygments: true
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
plugins:
  - search
