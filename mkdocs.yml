site_name: GEIL - GNTECH Enterprise Infrastructure Library
site_description: Private enterprise implementation guide for Microsoft-centered infrastructure
site_author: GNTECH Infrastructure Engineering
site_url: https://docs.gntechlabs.me/
repo_url: https://github.com/gntech-dev/geil-enterprise-docs
repo_name: gntech-dev/geil-enterprise-docs
edit_uri: edit/main/docs/
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
plugins:
  - search
nav:
  - Home: index.md
  - Project:
      - project/index.md
      - Project Charter: project/project-charter.md
      - Environment Specification: project/environment-specification.md
      - Document Index: project/document-index.md
      - Documentation Backlog: project/documentation-backlog.md
      - Documentation Roadmap: project/documentation-roadmap.md
      - Epic and Release Architecture: project/epic-release-architecture.md
  - Platform:
      - platform/index.md
      - Cloudflare Pages Deployment Runbook: platform/cloudflare-pages-deployment.md
  - Governance:
      - governance/index.md
      - Documentation Standard: governance/documentation-standard.md
      - Naming and Addressing Standard: governance/naming-addressing-standard.md
      - Roadmap: governance/roadmap.md
      - Backlog: governance/backlog.md
      - ADRs:
          - governance/adrs/index.md
          - ADR-0001 MkDocs Material: governance/adrs/ADR-0001-mkdocs-material.md
  - Security:
      - security/index.md
      - Privileged Access Model: security/privileged-access-model.md
  - Architecture:
      - architecture/index.md
      - Reference Architecture: architecture/reference-architecture.md
      - Environment Tiers: architecture/environment-tiers.md
      - Identity Architecture: architecture/identity-architecture.md
      - Network Architecture: architecture/network-architecture.md
  - Foundation:
      - foundation/index.md
      - Phase 0 Prerequisites: foundation/phase-0-prerequisites.md
      - Proxmox VE Baseline: foundation/proxmox-ve-baseline.md
      - OPNsense Edge Firewall: foundation/opnsense-edge-firewall.md
  - Microsoft Core:
      - microsoft-core/index.md
      - Windows Server 2025 Baseline: microsoft-core/windows-server-2025-baseline.md
      - Active Directory Implementation: microsoft-core/active-directory-implementation.md
      - DNS and DHCP Implementation: microsoft-core/dns-dhcp-implementation.md
      - Group Policy Baseline: microsoft-core/group-policy-baseline.md
      - AD CS PKI: microsoft-core/ad-cs-pki.md
      - NPS RADIUS 802.1X: microsoft-core/nps-radius-8021x.md
      - Windows Admin Center: microsoft-core/windows-admin-center.md
      - PowerShell Operations: microsoft-core/powershell-operations.md
  - Cloud and Endpoint:
      - cloud-endpoint/index.md
      - Microsoft 365 Tenant Foundation: cloud-endpoint/microsoft-365-tenant-foundation.md
      - Entra ID Hybrid Identity: cloud-endpoint/entra-id-hybrid-identity.md
      - Intune Windows 11 Enterprise: cloud-endpoint/intune-windows11-enterprise.md
      - Windows Hello for Business: cloud-endpoint/windows-hello-for-business.md
      - Microsoft Defender: cloud-endpoint/microsoft-defender.md
  - Operations:
      - operations/index.md
      - Monitoring and Alerting: operations/monitoring-alerting.md
      - Backup and Recovery: operations/backup-recovery.md
      - Troubleshooting: operations/troubleshooting.md
      - Scaling Model: operations/scaling-model.md
      - Security Operations: operations/security-operations.md
